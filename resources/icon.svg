<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="gem-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E05040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC342D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Ruby gem shape -->
  <polygon
    points="64,8 120,40 120,88 64,120 8,88 8,40"
    fill="url(#gem-gradient)"
    stroke="#A02820"
    stroke-width="2"
  />
  <!-- Top facet highlight -->
  <polygon
    points="64,8 120,40 64,56 8,40"
    fill="#E86058"
    opacity="0.6"
  />
  <!-- Center line highlight -->
  <line x1="8" y1="40" x2="120" y2="40" stroke="#A02820" stroke-width="1" opacity="0.4" />
  <line x1="64" y1="56" x2="64" y2="120" stroke="#A02820" stroke-width="1" opacity="0.3" />
  <line x1="64" y1="56" x2="8" y2="88" stroke="#A02820" stroke-width="1" opacity="0.3" />
  <line x1="64" y1="56" x2="120" y2="88" stroke="#A02820" stroke-width="1" opacity="0.3" />
</svg>
